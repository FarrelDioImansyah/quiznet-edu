<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QuizNet Edu — Host Panel</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .host-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; max-width: 900px; margin: 0 auto; padding: 24px; }
    .host-card { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 20px; }
    .host-card h3 { font-size: 14px; letter-spacing: 2px; text-transform: uppercase; color: #8b949e; margin-bottom: 16px; }
    .room-code-big { font-size: 48px; font-weight: 900; letter-spacing: 8px; color: #58a6ff; text-align: center; padding: 16px; background: #0d1117; border-radius: 8px; margin-bottom: 12px; }
    .player-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; background: #0d1117; border-radius: 8px; margin-bottom: 8px; font-size: 14px; }
    .player-item .dot { width: 8px; height: 8px; background: #3fb950; border-radius: 50%; }
    .import-zone { border: 2px dashed #30363d; border-radius: 8px; padding: 24px; text-align: center; cursor: pointer; transition: border-color .2s; margin-bottom: 12px; }
    .import-zone:hover { border-color: #58a6ff; }
    .import-zone input { display: none; }
    .import-zone p { color: #8b949e; font-size: 14px; margin-top: 8px; }
    .import-zone .icon { font-size: 32px; }
    .question-preview { background: #0d1117; border-radius: 8px; padding: 12px; margin-bottom: 8px; font-size: 13px; }
    .question-preview .q-num { color: #58a6ff; font-weight: 700; margin-bottom: 4px; }
    .question-preview .q-text { color: #e6edf3; margin-bottom: 6px; }
    .question-preview .q-answer { color: #3fb950; font-size: 12px; }
    .status-badge { display: inline-block; padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; }
    .badge-waiting { background: #1f3a5f; color: #58a6ff; }
    .badge-ready { background: #1a3a2a; color: #3fb950; }
    .btn-start { width: 100%; padding: 16px; font-size: 18px; font-weight: 800; background: #3fb950; color: #0d1117; border: none; border-radius: 10px; cursor: pointer; margin-top: 12px; transition: opacity .2s; }
    .btn-start:hover { opacity: .85; }
    .btn-start:disabled { opacity: .4; cursor: not-allowed; }
    .btn-danger { background: transparent; border: 1px solid #f85149; color: #f85149; margin-top: 8px; }
    .template-link { color: #58a6ff; font-size: 13px; text-decoration: none; display: block; text-align: center; margin-top: 8px; }
    .template-link:hover { text-decoration: underline; }
    .count-badge { background: #1f6feb33; border: 1px solid #1f6feb; color: #58a6ff; padding: 2px 8px; border-radius: 20px; font-size: 12px; margin-left: 8px; }
    h1.host-title { text-align: center; padding: 20px 24px 0; font-size: 20px; }
    h1.host-title span { color: #58a6ff; }
  </style>
</head>
<body>
  <h1 class="host-title">⚡ QuizNet<span>Edu</span> — Host Panel</h1>

  <div class="host-layout">

    <!-- Kiri: Room Info + Players -->
    <div>
      <div class="host-card" style="margin-bottom:16px">
        <h3>🏠 Room Code</h3>
        <div class="room-code-big" id="room-code-display">------</div>
        <p style="text-align:center;color:#8b949e;font-size:13px">Bagikan kode ini ke peserta</p>
      </div>

      <div class="host-card">
        <h3>👥 Peserta <span class="count-badge" id="player-count">0</span></h3>
        <div id="player-list">
          <p style="color:#8b949e;font-size:14px;text-align:center;padding:16px">Menunggu peserta bergabung...</p>
        </div>
      </div>
    </div>

    <!-- Kanan: Import Soal + Kontrol -->
    <div>
      <div class="host-card" style="margin-bottom:16px">
        <h3>📋 Import Soal JSON <span class="count-badge" id="q-count">0 soal</span></h3>

        <div class="import-zone" id="drop-zone" onclick="document.getElementById('file-input').click()">
          <div class="icon">📂</div>
          <strong style="color:#e6edf3">Klik atau drag file JSON</strong>
          <p>Format: array of questions</p>
          <input type="file" id="file-input" accept=".json" onchange="handleFileImport(event)">
        </div>

        <a href="#" class="template-link" onclick="downloadTemplate()">⬇ Download template JSON</a>

        <div id="question-list" style="max-height:300px;overflow-y:auto;margin-top:12px"></div>
      </div>

      <div class="host-card">
        <h3>🎮 Kontrol Kuis</h3>
        <div style="margin-bottom:12px;font-size:14px;color:#8b949e">
          Status: <span class="status-badge badge-waiting" id="status-badge">Menunggu</span>
        </div>
        <button class="btn-start" id="btn-start" disabled onclick="startQuiz()">
          🚀 Mulai Kuis
        </button>
        <button class="btn-start btn-danger" onclick="closeRoom()">
          ✕ Tutup Room
        </button>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    const state  = JSON.parse(sessionStorage.getItem('quiznet_state') || '{}');
    let importedQuestions = [];

    // Init
    window.addEventListener('DOMContentLoaded', () => {
      if (!state.roomCode || !state.isHost) {
        window.location.href = '/';
        return;
      }
      document.getElementById('room-code-display').textContent = state.roomCode;

      // Rejoin sebagai host
      socket.emit('rejoin-room', {
        username: state.username,
        roomCode: state.roomCode,
        isHost: true
      });
    });

    // Socket events
    socket.on('connect', () => {
      if (state.roomCode && state.isHost) {
        socket.emit('rejoin-room', { username: state.username, roomCode: state.roomCode, isHost: true });
      }
    });

    socket.on('player-list-update', ({ players }) => {
      const list = document.getElementById('player-list');
      document.getElementById('player-count').textContent = players.length;

      if (players.length === 0) {
        list.innerHTML = '<p style="color:#8b949e;font-size:14px;text-align:center;padding:16px">Menunggu peserta bergabung...</p>';
      } else {
        list.innerHTML = players.map(p =>
          `<div class="player-item"><div class="dot"></div>${p.username}</div>`
        ).join('');
      }
      checkStartReady();
    });

    socket.on('error-message', ({ msg }) => alert(msg));
    socket.on('questions-imported', ({ count }) => {
      document.getElementById('q-count').textContent = `${count} soal`;
      checkStartReady();
    });
    socket.on('room-joined', () => checkStartReady());

    // Import file JSON
    function handleFileImport(event) {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (e) => {
        try {
          const data = JSON.parse(e.target.result);
          if (!Array.isArray(data)) return alert('File harus berupa array JSON!');
          importedQuestions = data;
          renderQuestionPreview(data);
          socket.emit('import-questions', { roomCode: state.roomCode, questions: data });
        } catch (err) {
          alert('File JSON tidak valid: ' + err.message);
        }
      };
      reader.readAsText(file);
    }

    // Drag & drop
    const dropZone = document.getElementById('drop-zone');
    dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.style.borderColor = '#58a6ff'; });
    dropZone.addEventListener('dragleave', () => { dropZone.style.borderColor = '#30363d'; });
    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropZone.style.borderColor = '#30363d';
      const file = e.dataTransfer.files[0];
      if (file) { document.getElementById('file-input').files = e.dataTransfer.files; handleFileImport({ target: { files: e.dataTransfer.files } }); }
    });

    function renderQuestionPreview(questions) {
      const el = document.getElementById('question-list');
      el.innerHTML = questions.map((q, i) =>
        `<div class="question-preview">
          <div class="q-num">Soal ${i + 1} · ${q.time_limit || 20}s</div>
          <div class="q-text">${q.question_text}</div>
          <div class="q-answer">✅ Jawaban: ${q.correct_answer.toUpperCase()}. ${q['option_' + q.correct_answer]}</div>
        </div>`
      ).join('');
    }

    function checkStartReady() {
      const playerCount = document.querySelectorAll('.player-item').length;
      const hasQuestions = importedQuestions.length > 0;
      const btn = document.getElementById('btn-start');
      const badge = document.getElementById('status-badge');

      if (playerCount > 0 && hasQuestions) {
        btn.disabled = false;
        badge.textContent = 'Siap Mulai';
        badge.className = 'status-badge badge-ready';
      } else {
        btn.disabled = true;
        badge.textContent = 'Menunggu';
        badge.className = 'status-badge badge-waiting';
      }
    }

    function startQuiz() {
      socket.emit('start-quiz');
      // Host tetap di halaman ini untuk monitor, tidak ke quiz.html
      document.getElementById('btn-start').disabled = true;
      document.getElementById('btn-start').textContent = '⏳ Kuis Berjalan...';
    }

    function closeRoom() {
      if (confirm('Tutup room dan akhiri semua koneksi?')) {
        socket.emit('close-room');
        sessionStorage.clear();
        window.location.href = '/';
      }
    }

    // Download template JSON
    function downloadTemplate() {
      const template = [
        {
          "question_text": "Apa protokol yang digunakan untuk komunikasi realtime?",
          "option_a": "HTTP",
          "option_b": "WebSocket",
          "option_c": "FTP",
          "option_d": "SMTP",
          "correct_answer": "b",
          "time_limit": 20
        },
        {
          "question_text": "Singkatan P2P adalah?",
          "option_a": "Port to Port",
          "option_b": "Packet to Packet",
          "option_c": "Peer to Peer",
          "option_d": "Path to Path",
          "correct_answer": "c",
          "time_limit": 15
        }
      ];
      const blob = new Blob([JSON.stringify(template, null, 2)], { type: 'application/json' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'template-soal.json';
      a.click();
    }

    // Monitor kuis berjalan
    socket.on('leaderboard-update', ({ leaderboard }) => {
      const list = document.getElementById('player-list');
      list.innerHTML = leaderboard.map(p =>
        `<div class="player-item">
          <div class="dot"></div>
          <span style="color:#58a6ff;font-weight:700">#${p.rank}</span>
          ${p.username}
          <span style="margin-left:auto;color:#f0b429;font-weight:700">${p.score}</span>
        </div>`
      ).join('');
    });

    socket.on('game-over', ({ leaderboard }) => {
      document.getElementById('btn-start').textContent = '✅ Kuis Selesai';
      document.getElementById('status-badge').textContent = 'Selesai';
    });
  </script>
</body>
</html>
